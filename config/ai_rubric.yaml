version: "2.0.0"
construct: >-
  测量招聘岗位中明示要求的 AI / 数字技术强度，而不是公司本身的技术程度。
core_duty_test: >-
  如果移除该技术后岗位的主要产出或核心职责不再成立，则技术是核心；
  若岗位仍然是销售、行政、财务、设计或运营，技术只是完成工作的工具，则不是核心。
scores:
  0:
    name: 无实质数字技术
    definition: 广告没有明示要求使用数字工具、信息系统、编程、数据、自动化或 AI。
    include:
      - 仅一般销售、行政、财务、生产、客户服务或管理职责
      - “智能”只出现在品牌、产品或公司名称中
    exclude:
      - 不得因岗位所在行业或岗位通常可能使用技术而猜测加分
  1:
    name: 辅助数字工具
    definition: 数字工具、信息系统或普通数据处理用于辅助非技术岗位，但不是岗位的核心产出。
    include:
      - Office、Excel、ERP、SAP、MES、PLM、财务或业务系统的普通使用
      - 报表、统计、系统录入、一般数据分析
      - CAD、剪辑、绘图等软件仅作为专业岗位的工具
    exclude:
      - 负责开发、搭建、运维或改造这些系统时应考虑 2 分
  2:
    name: 核心数字技术
    definition: 软件、数据、信息系统、自动化、嵌入式、数字芯片或非 AI 专业算法是岗位核心产出。
    include:
      - 软件开发、数据工程、数据库、网络安全、系统运维、信息化建设
      - 自动化控制、嵌入式、FPGA、芯片逻辑、物联网
      - 金融定价模型、传统统计模型、物理仿真、控制算法、通信算法等非 AI 模型/算法
      - 大数据平台、数据仓库、ETL、业务统计建模
    exclude:
      - 仅使用软件完成非技术主业时应为 1 分
      - 明确 AI / 机器学习研发时应为 3 分
  3:
    name: 严格 AI 研发
    definition: 岗位核心职责明确涉及 AI、机器学习或数据驱动学习算法的研发、训练、评估或部署。
    include:
      - 人工智能、机器学习、深度学习、神经网络
      - 计算机视觉、机器视觉、模式识别、NLP、大模型、生成式 AI、推荐系统
      - 明确使用训练数据、特征工程、模型训练/推理/评估的算法研发
    exclude:
      - 金融定价模型、风险计量模型、传统统计模型
      - 物理仿真、器件物理模型、工程仿真
      - 传统控制算法、通信算法、协议栈开发、优化算法（除非明确与 AI/ML 相关）
      - 大数据工程、数据仓库、ETL、普通业务数据分析或建模
confidence:
  high: 原文有两处以上一致的明确职责/技术证据，且与相邻等级边界清晰。
  medium: 原文只有一处明确证据，或核心/辅助边界需要轻微判断。
  low: 原文信息不足、相互矛盾，或 0/1、1/2、2/3 的相邻等级均有合理解释。
evidence_rules:
  - evidence 必须是原文中连续出现的 1–3 个短语，不得改写、总结或补写原文未说明的技术。
  - 1–3 分必须有真正支持该分数的证据；“销售”“会计”等普通岗位标题不能单独作为正分证据。
  - 岗位标题只有在本身明确包含 AI/算法/软件/数据/系统/自动化等技术语义时才可作为证据。
reason_rule: 理由必须同时说明为什么选择本等级，以及为什么不是相邻等级。
boundary_examples:
  - text: “销售经理，熟练使用 Excel 和 CRM”
    score: 1
    why: 数字工具辅助销售，销售仍是核心产出。
  - text: “负责 CRM 系统开发、接口设计和部署”
    score: 2
    why: 软件系统开发是核心职责。
  - text: “开发量化定价模型与风险计量算法”
    score: 2
    why: 属于高级数字模型，但未明确涉及 AI/ML。
  - text: “训练深度学习模型完成图像识别”
    score: 3
    why: 明确涉及深度学习模型训练和计算机视觉。
