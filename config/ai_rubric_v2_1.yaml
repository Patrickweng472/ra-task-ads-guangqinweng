version: "2.1.0"
status: candidate_human_reference
construct: >-
  测量招聘岗位原文明示要求的 AI／数字技术强度，而不是公司、行业或产品本身的技术程度。
core_duty_test: >-
  移除原文明示的数字技术能力后，岗位的主要产出是否无法成立？若无法成立，技术是核心；
  若岗位仍然是机械设计、销售、行政、财务、普通运营等非数字主业，技术只是完成工作的工具，则是辅助。
dimensions:
  technology_role:
    none: 原文没有明示数字工具、数字系统、软件、数据、数字硬件或 AI 要求。
    auxiliary: 数字技术只辅助非数字主业，移除后岗位的主要产出仍然成立。
    core: 数字技术能力本身构成岗位主要产出，移除后岗位无法成立。
  strict_ai:
    false: 未明确承担 AI／机器学习的研发、训练、推理、评估或部署。
    true: 核心职责明确承担 AI／ML／CV／NLP／大模型或数据驱动学习模型的研发、训练、推理、评估或部署。
deterministic_mapping:
  - technology_role: none
    strict_ai: false
    score: 0
  - technology_role: auxiliary
    strict_ai: false
    score: 1
  - technology_role: core
    strict_ai: false
    score: 2
  - technology_role: core
    strict_ai: true
    score: 3
invalid_combinations:
  - technology_role 为 none 或 auxiliary 时 strict_ai 不得为 true
scores:
  0:
    name: 无明示数字技术
    definition: 广告没有明示要求数字工具、信息系统、软件、数据、数字硬件、编程、自动化或 AI。
    include:
      - 一般销售、行政、财务、生产、客户服务或管理职责，且没有明示数字技术要求
      - “智能”“算法”“AI”等词只描述公司、产品、客户或项目背景，不是该岗位承担的技术工作
    exclude:
      - 不得依据岗位惯例、专业常识、公司行业或产品技术进行推测
  1:
    name: 辅助数字技术
    definition: 数字工具、信息系统或普通数据处理只用于完成非数字主业，不是岗位主要产出。
    include:
      - Office、Excel、ERP、SAP、MES、PLM、CRM、财务或业务系统的普通使用
      - 一般报表、统计、系统录入、数据整理或基于现成工具的常规分析
      - CAD、CAE、剪辑、绘图、专业工程软件仅作为机械设计、建筑、内容、财务等主业的工具
      - 仅协助 AI 项目推进、沟通、排期或验收，但不承担模型、数据或系统技术工作
      - 销售岗位只要求理解技术产品、发现商机或转交技术问题
    exclude:
      - 负责开发、搭建、运维、测试、诊断、配置、保护或技术支持数字系统时应考虑 2 分
  2:
    name: 核心数字技术
    definition: 软件、数据、系统、数字硬件、自动化或非 AI 专业算法是岗位主要产出。
    include:
      - 软件开发、系统架构、接口、数据库、数据工程、数据平台、网络安全、系统运维和信息化建设
      - 数字系统或软件的测试、质量保障、故障诊断、配置、部署和技术支持
      - 技术售前以技术方案、诊断、配置、网络或安全咨询为主要产出，而不是一般销售
      - 自动化控制、嵌入式、FPGA、数字芯片、物联网和数字硬件测试
      - 数据分析、统计模型、数据产品或数据平台本身是岗位主要产出
      - 金融定价模型、传统统计模型、物理仿真、控制算法、通信算法、传统 ISP／图像算法等非 AI 模型或算法
    exclude:
      - 只使用数字工具完成非数字主业时为 1 分
      - 明确承担 AI／机器学习研发、训练、推理、评估或部署时为 3 分
  3:
    name: 严格 AI 技术
    definition: 岗位核心职责明确涉及 AI、机器学习或数据驱动学习模型的研发、训练、推理、评估或部署。
    include:
      - 人工智能、机器学习、深度学习、神经网络
      - 计算机视觉、机器视觉、模式识别、NLP、大模型、生成式 AI、推荐系统
      - 明确使用训练数据、特征工程、模型训练、推理、评估或部署的算法研发
    exclude:
      - 仅协调、管理或支持 AI 项目而不承担模型、数据或系统技术工作
      - 金融定价、风险计量、传统统计、物理仿真、器件物理、控制、通信、优化和传统 ISP 算法，除非明确与 AI／ML 相关
      - 大数据、数据仓库、ETL、普通数据分析或统计建模本身
boundary_rules:
  technical_presales: >-
    主要产出是技术方案、诊断、配置、PoC、网络或安全咨询时为 core（2）；
    主要产出是销售，只要求理解技术产品或转交问题时为 auxiliary（1）。
  testing: >-
    对软件、系统、数字硬件进行测试设计、自动化测试、数据采集分析或故障诊断时为 core（2）；
    一般产品质量检查且未明示数字技术时不得推测加分。
  engineering_tools: >-
    CAD／CAE／ERP 等仅用于机械、建筑、生产、财务等非数字主业时为 auxiliary（1）；
    开发、运维或集成这些系统时为 core（2）。
  ai_coordination: >-
    只“协助 AI 项目推进”且不承担模型、数据或系统技术工作，最高为 auxiliary（1）。
  data_work: >-
    一般报表、录入、汇总为 auxiliary（1）；数据分析、统计建模、数据产品或数据平台本身是主要产出时为 core（2）。
  traditional_algorithms: >-
    明确的控制、通信、优化、传统 ISP／图像处理算法为 core 且 strict_ai=false（2）；
    只有明确的 AI／ML／数据驱动学习职责才为 3。
confidence:
  high: 至少两处一致明确证据，职责和相邻等级边界清晰。
  medium: 只有一处明确证据，或需要轻微的核心／辅助边界判断。
  low: 信息不足、存在矛盾，或两个相邻等级都有合理解释。
evidence_rules:
  - 正分必须提供至少一段可在岗位、描述或标签原文中定位的连续证据，不得改写或拼接。
  - 证据必须支持该分数的关键边界；普通岗位标题不能单独支持正分。
  - 0 分 evidence 可以为空；1–3 分 evidence 不得为空。
reason_rule: >-
  理由必须说明 technology_role 为什么是 none／auxiliary／core、为什么不是相邻等级；
  若原文出现 AI 相关词，还必须说明其是否构成严格 AI 技术工作。
boundary_pair_values:
  - none
  - 0_vs_1
  - 1_vs_2
  - 2_vs_3
