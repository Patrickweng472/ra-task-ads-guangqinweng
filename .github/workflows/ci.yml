name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: uv sync --frozen --all-groups
      - name: Rebuild all formal outputs without network
        run: uv run ra-task run --offline
      - name: Test with coverage gate
        run: uv run pytest --cov=ra_task --cov-report=term-missing --cov-fail-under=80
      - name: Secret pattern scan
        run: |
          if git grep -nE 'sk-[A-Za-z0-9]{20,}' -- ':!data/raw/**'; then
            echo 'Potential API key found' >&2
            exit 1
          fi
      - name: Verify committed outputs
        run: uv run ra-task verify
      - uses: actions/upload-artifact@v7
        with:
          name: ra-task-submission
          path: dist/ra_task_submission.zip
